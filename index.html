<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💣 Pink Bomb – Klik untuk Meledakkan</title>
  <meta name="description" content="Animasi bom pink cantik – klik untuk meledak dan lihat pesannya!"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Floating background bubbles -->
  <div class="bg-bubbles" id="bg-bubbles"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Main scene -->
  <div class="scene" id="scene">

    <!-- Title -->
    <p class="subtitle" id="subtitle">✨ klik bom untuk mengungkap pesan ✨</p>

    <!-- BOMB -->
    <div class="bomb-wrapper" id="bomb-wrapper">
      <div class="bomb-shadow"></div>
      <div class="bomb" id="bomb" role="button" tabindex="0" aria-label="Klik bom">

        <!-- Body -->
        <div class="bomb-body">
          <div class="bomb-shine"></div>
          <div class="bomb-shine2"></div>
          <!-- Face -->
          <div class="bomb-face">
            <div class="eye left-eye"><div class="pupil"></div></div>
            <div class="eye right-eye"><div class="pupil"></div></div>
            <div class="mouth"></div>
          </div>
          <!-- Decorative dots -->
          <div class="dot d1"></div>
          <div class="dot d2"></div>
          <div class="dot d3"></div>
        </div>

        <!-- Fuse -->
        <div class="fuse">
          <div class="fuse-coil"></div>
          <div class="spark-group">
            <div class="spark s1"></div>
            <div class="spark s2"></div>
            <div class="spark s3"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Click hint -->
    <div class="click-hint" id="click-hint">
      <span class="hand">👆</span> Tekan aku!
    </div>

  </div>

  <!-- LETTER / SURAT – hidden initially -->
  <div class="letter-scene hidden" id="letter-scene">
    <div class="envelope" id="envelope">
      <div class="envelope-back"></div>
      <div class="envelope-flap" id="env-flap"></div>
      <div class="letter-paper" id="letter-paper">
        <div class="letter-content" id="letter-content">
          <div class="letter-deco-top">💖 ✦ 💖</div>
          <h2 class="letter-heading">Hey, kamu...</h2>
          <p class="letter-text" id="letter-text"></p>
          <div class="letter-sig">— dengan cinta 🌸</div>
        </div>
      </div>
      <div class="envelope-front-left"></div>
      <div class="envelope-front-right"></div>
      <div class="envelope-front-bottom"></div>
    </div>

    <button class="reset-btn" id="reset-btn">🔁 Ulangi</button>
  </div>

  <!-- Canvas for confetti -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Explosion overlay -->
  <div class="explosion-overlay" id="explosion-overlay"></div>

  <script src="script.js"></script>
</body>
</html>
